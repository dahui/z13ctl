name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
      release:
        description: 'Run goreleaser build + publish'
        type: boolean
        default: false
      aur:
        description: 'Publish to AUR'
        type: boolean
        default: true
      homebrew:
        description: 'Publish to Homebrew'
        type: boolean
        default: true
      pkgrel:
        description: 'AUR pkgrel (increment for same-version republish)'
        type: string
        default: '1'
      docs:
        description: 'Deploy documentation'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.release)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur:
    needs: release
    runs-on: ubuntu-latest
    if: >-
      always() &&
      (needs.release.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.aur)) &&
      !contains(github.event.inputs.tag || github.ref_name, '-')
    steps:
      - uses: actions/checkout@v4

      - name: Get version and sha256
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          URL="https://github.com/dahui/z13ctl/releases/download/${TAG}/z13ctl_${VERSION}_linux_amd64.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"

      - name: Patch PKGBUILD
        run: |
          sed -i "s/PKGVER_PLACEHOLDER/${{ steps.meta.outputs.version }}/" contrib/aur/PKGBUILD
          sed -i "s/SHA256_PLACEHOLDER/${{ steps.meta.outputs.sha256 }}/"  contrib/aur/PKGBUILD
          sed -i "s/pkgrel=1/pkgrel=${{ inputs.pkgrel || '1' }}/"         contrib/aur/PKGBUILD

      - uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: z13ctl-bin
          pkgbuild: contrib/aur/PKGBUILD
          assets: contrib/aur/z13ctl-bin.install
          commit_username: "z13ctl Release Bot"
          commit_email: "noreply@github.com"
          ssh_private_key: ${{ secrets.AUR_KEY }}
          commit_message: "Update to ${{ github.event.inputs.tag || github.ref_name }}"
          force_push: true

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: >-
      always() &&
      (needs.release.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.homebrew)) &&
      !contains(github.event.inputs.tag || github.ref_name, '-')
    steps:
      - uses: actions/checkout@v4

      - name: Get version and sha256
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          URL="https://github.com/dahui/z13ctl/releases/download/${TAG}/z13ctl_${VERSION}_linux_amd64.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"

      - name: Push formula to tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}@github.com/dahui/homebrew-z13ctl.git" tap
          mkdir -p tap/Formula
          cp contrib/homebrew/z13ctl.rb tap/Formula/z13ctl.rb
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.meta.outputs.version }}/g" tap/Formula/z13ctl.rb
          sed -i "s/SHA256_PLACEHOLDER/${{ steps.meta.outputs.sha256 }}/"    tap/Formula/z13ctl.rb
          cd tap
          git config user.name  "z13ctl Release Bot"
          git config user.email "noreply@github.com"
          git add Formula/z13ctl.rb
          git commit -m "Update z13ctl to ${{ github.event.inputs.tag || github.ref_name }}"
          git push

  docs:
    needs: release
    runs-on: ubuntu-latest
    if: always() && (needs.release.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.docs))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('requirements.txt') }}
          path: .cache
          restore-keys: mkdocs-material-

      - name: Install MkDocs Material
        run: pip install -r requirements.txt

      - name: Install gomarkdoc
        run: go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest

      - name: Generate API reference
        run: gomarkdoc ./api/... > docs/api-reference.md

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
